<p *ngIf="loading">
  Loading courses...
</p>

<p *ngIf="errorMessage">
  {{ errorMessage }}
</p>

<input
  type="text"
  placeholder="Search Courses"
  [(ngModel)]="searchTerm">

<div class="course-list">

  <app-course-card
    *ngFor="let course of filteredCourses"
    [name]="course.name"
    [code]="course.code"
    [credits]="course.credits"
    [grade]="course.grade">
  </app-course-card>

</div>


<p *ngIf="filteredCourses.length === 0">
  No courses found
</p>
